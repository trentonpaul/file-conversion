apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: fileconversion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: fileconversion-worker:latest
          imagePullPolicy: Never
          env:
            - name: RabbitMq__HostName
              value: rabbitmq
            - name: RabbitMq__Port
              value: "5672"
            - name: RabbitMq__QueueName
              value: conversion-jobs
            - name: RabbitMq__UserName
              valueFrom:
                secretKeyRef:
                  name: fileconversion-secrets
                  key: rabbitmq-user
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: fileconversion-secrets
                  key: rabbitmq-pass
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: fileconversion-secrets
                  key: connection-string
            - name: Storage__BasePath
              value: /app/storage
          volumeMounts:
            - name: shared-storage
              mountPath: /app/storage
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: shared-storage-pvc